<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <link rel="stylesheet" href="mini.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bungee&display=swap" rel="stylesheet">


</head>
<body>
    
        <div class="container">
            <div id="menu-screen">
              <h1 class="title">Math Game</h1>
              <p>Mainkan Game Sederhana Melatih otak dengan Matematic Dasar</p>
              <div class ="btn-class">
               <button class="btn-start" onclick="startGame()">Mulai</button>
               </div>
            </div>
      </div>

      <div id="game-screen" class="hidden">
        <div class="score-board">Score : <span id="score">0</span></div>
        <div class="question-box" id="pertayaan">2 + 2 = ?</div>
        <div class="options-grid" id="jawaban">

        </div>
        <div id="pesan"></div>
      </div>
      <div id="game-out" class="hidden">
        <h1>Permainan Selesai</h1>
        <p>Score Akhir Kamu:</p>
        <h2 id="final-score">0</h2>
         <button class="restart-btn" onclick="endGame()">Main Lagi</button>
      </div>
    <script src="Gamemini.js"></script>
</body>
</html>
